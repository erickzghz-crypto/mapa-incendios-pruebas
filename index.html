<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Incendios</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        /* Reseteo básico para quitar márgenes por defecto */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Estilo general de la página */
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #eef2f5; /* Fondo gris claro y limpio */
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Estilo del encabezado superior */
        header {
            width: 100%;
            background-color: #1a202c; /* Gris oscuro / Azul marino */
            color: white;
            text-align: center;
            padding: 1.5rem 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: 1px;
        }

        header p {
            font-size: 1rem;
            color: #a0aec0;
            margin-top: 5px;
        }

        /* Contenedor tipo "tarjeta" para el mapa */
        .dashboard-container {
            width: 95%;
            max-width: 1300px;
            background: white;
            border-radius: 12px; /* Esquinas redondeadas */
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); /* Sombra 3D */
            overflow: hidden; 
            margin-bottom: 3rem;
        }

        /* Ajustes del iframe para que llene la tarjeta */
        iframe {
            width: 100%;
            height: 75vh;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <header>
        <h1>Mapa de Riesgo de Incendios</h1>
        <p>Sistema de Monitoreo y Análisis Espacial</p>
    </header>
    
    <div class="dashboard-container">
        <iframe title="incendios_hackaton" src="https://app.powerbi.com/view?r=eyJrIjoiNDFhMjNjZjgtNjU2OS00ZmRlLTkyOWEtMzk5MjljZjcyYTY0IiwidCI6ImY5NGJmNGQ5LTgwOTctNDc5NC1hZGY2LWE1NDY2Y2EyODU2MyIsImMiOjR9" allowFullScreen="true"></iframe>
    </div>

</body>
</html>
