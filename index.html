<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de Monitoreo - Hackaton 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-base: #020617;
            --neon-blue: #38bdf8;
            --neon-red: #ef4444;
            --glass-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            /* Efecto de Cuadrícula Tecnológica (Cyber Grid) */
            background-image: 
                linear-gradient(var(--glass-border) 1px, transparent 1px),
                linear-gradient(90deg, var(--glass-border) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center center;
        }

        /* Efecto Glassmorphism para el Header */
        header {
            width: 100%;
            padding: 1.2rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 2rem;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-titles h1 {
            font-size: 1.8rem;
            font-weight: 700;
            /* Título con degradado metálico/azul */
            background: linear-gradient(90deg, #f8fafc, var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .header-titles p {
            font-size: 0.85rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        /* Etiqueta de estatus estilo Táctico */
        .status-badge {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(239, 68, 68, 0.05);
            padding: 8px 20px;
            border-radius: 4px;
            border: 1px solid rgba(239, 68, 68, 0.3);
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--neon-red);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.1) inset;
        }

        .pulse {
            width: 10px;
            height: 10px;
            background-color: var(--neon-red);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--neon-red);
            animation: blink 1.2s infinite alternate;
        }

        @keyframes blink {
            0% { opacity: 0.4; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.4); }
        }

        /* Contenedor principal con efecto de panel de control */
        .dashboard-container {
            width: 95%;
            max-width: 1500px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border-radius: 12px;
            padding: 10px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), 0 0 20px rgba(56, 189, 248, 0.05);
            margin-bottom: 2rem;
            position: relative;
        }

        /* Decoración de esquinas (Brackets tecnológicos) */
        .dashboard-container::before, .dashboard-container::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            border: 2px solid transparent;
            pointer-events: none;
        }
        .dashboard-container::before {
            top: -1px; left: -1px;
            border-top-color: var(--neon-blue);
            border-left-color: var(--neon-blue);
            border-top-left-radius: 12px;
        }
        .dashboard-container::after {
            bottom: -1px; right: -1px;
            border-bottom-color: var(--neon-blue);
            border-right-color: var(--neon-blue);
            border-bottom-right-radius: 12px;
        }

        /* Recorte para la barra blanca de Power BI */
        .iframe-crop-wrapper {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            height: 75vh;
            background: #000;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(100% + 40px);
            border: none;
        }

        footer {
            margin-top: auto;
            padding: 2rem;
            color: #64748b;
            font-size: 0.8rem;
            text-align: center;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-titles">
            <h1>SISTEMA DE INTELIGENCIA ESPACIAL</h1>
            <p>Centro de Control Táctico - Riesgo de Incendios</p>
        </div>
        <div class="status-badge">
            <div class="pulse"></div>
            ENLACE SATELITAL ACTIVO
        </div>
    </header>
    
    <div class="dashboard-container">
        <div class="iframe-crop-wrapper">
            <iframe title="incendios_hackaton" src="https://app.powerbi.com/view?r=eyJrIjoiNDFhMjNjZjgtNjU2OS00ZmRlLTkyOWEtMzk5MjljZjcyYTY0IiwidCI6ImY5NGJmNGQ5LTgwOTctNDc5NC1hZGY2LWE1NDY2Y2EyODU2MyIsImMiOjR9" allowFullScreen="true"></iframe>
        </div>
    </div>

    <footer>
        /// HACKATON 2026 | DESPLIEGUE OPERATIVO ///
    </footer>

</body>
</html>
